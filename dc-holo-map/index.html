<!doctype html><html><head><meta charset=utf-8><title>DC Holographic Real 3D Map</title><meta name=viewport content='width=device-width,initial-scale=1,viewport-fit=cover'><meta name=theme-color content='#02060d'><link rel=stylesheet href='https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css'><script src='https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.js'></script><style>html,body,#map{margin:0;width:100%;height:100%;overflow:hidden;background:#02060d;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,system-ui,sans-serif}#map{position:absolute;inset:0}.maplibregl-canvas{filter:saturate(1.25) contrast(1.05) brightness(.82)}.fx{position:fixed;inset:0;z-index:3;pointer-events:none;box-shadow:inset 0 0 125px #000,inset 0 0 30px rgba(0,229,255,.24);border:1px solid rgba(0,229,255,.18);background:repeating-linear-gradient(to bottom,rgba(255,255,255,.026) 0,rgba(255,255,255,.026) 1px,transparent 1px,transparent 5px)}.top,.panel{position:fixed;z-index:6;color:#e7fbff}.top{pointer-events:none;top:calc(10px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);min-width:285px;text-align:center;padding:10px 24px;background:linear-gradient(180deg,rgba(5,32,68,.94),rgba(2,10,22,.62));border:1px solid rgba(0,229,255,.58);clip-path:polygon(7% 0,93% 0,100% 50%,93% 100%,7% 100%,0 50%);box-shadow:0 0 28px rgba(0,229,255,.25);text-transform:uppercase;letter-spacing:.13em}.title{font-size:18px;font-weight:900;text-shadow:0 0 16px #00e5ff}.sub{font-size:10px;color:rgba(190,240,255,.75);margin-top:3px}.panel{left:14px;bottom:calc(14px + env(safe-area-inset-bottom));width:455px;background:linear-gradient(180deg,rgba(5,28,60,.88),rgba(2,10,24,.78));border:1px solid rgba(0,229,255,.38);border-radius:15px;box-shadow:0 0 30px rgba(0,229,255,.15),inset 0 0 20px rgba(0,229,255,.05);backdrop-filter:blur(10px);padding:13px}.panel h2{margin:0 0 9px;font-size:11px;letter-spacing:.16em;text-transform:uppercase}.buttons{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}button{border:1px solid rgba(0,229,255,.42);background:rgba(0,54,102,.66);color:#e7fbff;border-radius:10px;padding:10px 8px;font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase}button.active,button:hover{background:rgba(0,120,180,.72);box-shadow:0 0 18px rgba(0,229,255,.25)}#status{margin-top:9px;color:#caf7ff;font-size:12px;line-height:1.35}.marker{width:18px;height:18px;border-radius:999px;background:#00e5ff;border:1px solid #dffcff;box-shadow:0 0 16px #00e5ff,0 0 30px rgba(0,229,255,.55);cursor:pointer}.marker.monument{background:#ffb02e;box-shadow:0 0 18px #ffb02e,0 0 32px rgba(255,176,46,.55)}.maplibregl-popup-content{background:rgba(2,14,31,.92);color:#e7fbff;border:1px solid rgba(0,229,255,.42);border-radius:12px;box-shadow:0 0 24px rgba(0,229,255,.18);font-size:12px}.maplibregl-popup-tip{border-top-color:rgba(2,14,31,.92)!important}.load{position:fixed;inset:0;z-index:20;display:grid;place-items:center;background:rgba(1,3,10,.88);transition:opacity .45s;color:#e7fbff}.load.hide{opacity:0}.load>div{width:min(84vw,410px);padding:22px;text-align:center;border:1px solid rgba(0,229,255,.46);border-radius:16px;background:rgba(2,14,31,.86);box-shadow:0 0 34px rgba(0,229,255,.2);letter-spacing:.11em;text-transform:uppercase;font-size:12px}.line{height:4px;background:rgba(0,229,255,.15);margin-top:14px;border-radius:999px;overflow:hidden}.line span{display:block;height:100%;width:45%;background:linear-gradient(90deg,transparent,#00e5ff,#ffb02e);animation:m 1.2s linear infinite}@keyframes m{from{transform:translateX(-120%)}to{transform:translateX(240%)}}@media(max-width:900px){.top{min-width:235px;top:calc(8px + env(safe-area-inset-top));padding:8px 18px}.title{font-size:15px}.sub{font-size:9px}.panel{left:9px;right:9px;bottom:calc(9px + env(safe-area-inset-bottom));width:auto;padding:11px}.buttons{gap:7px}button{font-size:9px;padding:8px 6px}#status{font-size:11px}.maplibregl-ctrl-top-right{top:56px}}@media(max-height:610px){.panel{display:none}}</style></head><body><div id=map></div><div id=loading class=load><div>Loading real D.C. streets and 3D buildings<div class=line><span></span></div></div></div><div class=top><div class=title>Washington, D.C.</div><div class=sub>Real Streets + 3D Building Hologram</div></div><div class=panel><h2>Command Controls</h2><div class=buttons><button id=full>Full D.C.</button><button id=downtown>3D Downtown</button><button id=mall>National Mall</button><button id=capitol>Capitol</button><button id=white>White House</button><button id=hud>Hide HUD</button></div><div id=status>One finger pans. Pinch zooms. Two fingers rotate and pitch. Real streets and OSM building extrusions are live.</div></div><div class=fx></div><script>const $=id=>document.getElementById(id);const status=$('status');const map=new maplibregl.Map({container:'map',style:'https://tiles.openfreemap.org/styles/bright',center:[-77.0365,38.8952],zoom:14.45,pitch:62,bearing:-18,minZoom:10.3,maxZoom:19,maxBounds:[[-77.35,38.68],[-76.72,39.16]],attributionControl:false,canvasContextAttributes:{antialias:true}});map.addControl(new maplibregl.NavigationControl({visualizePitch:true}),'top-right');map.addControl(new maplibregl.AttributionControl({compact:true}),'bottom-right');function esc(s){return String(s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}function heightText(p){let v=p.render_height||p.height||(p['building:levels']?Math.round(Number(p['building:levels'])*3.2):null);return v?Math.round(Number(v))+' m':'unknown'}function paint(id,k,v){try{map.setPaintProperty(id,k,v)}catch(e){}}function holoStyle(){const layers=map.getStyle().layers||[];for(const l of layers){const id=(l.id||'').toLowerCase(),sl=String(l['source-layer']||'').toLowerCase();if(l.type==='background')paint(l.id,'background-color','#02060d');if(l.type==='fill'){if(id.includes('water')||sl.includes('water')){paint(l.id,'fill-color','#062a4b');paint(l.id,'fill-opacity',.78)}else if(id.includes('park')||id.includes('landuse')||sl.includes('landuse')){paint(l.id,'fill-color','#062014');paint(l.id,'fill-opacity',.42)}else{paint(l.id,'fill-color','#041326');paint(l.id,'fill-opacity',.52)}}if(l.type==='line'){const major=id.includes('motorway')||id.includes('trunk')||id.includes('primary')||id.includes('highway');const road=id.includes('road')||id.includes('street')||sl.includes('transportation');paint(l.id,'line-color',major?'#ffb02e':'#48eaff');paint(l.id,'line-opacity',major?.86:.64);if(id.includes('boundary'))paint(l.id,'line-color','#dffcff')}if(l.type==='symbol'){paint(l.id,'text-color','#dffcff');paint(l.id,'text-halo-color','#001420');paint(l.id,'text-halo-width',1.2);paint(l.id,'text-opacity',.92);paint(l.id,'icon-opacity',.68)}if(l.type==='circle'){paint(l.id,'circle-color','#00e5ff');paint(l.id,'circle-opacity',.72)}}}function labelLayer(){const layers=map.getStyle().layers||[];for(const l of layers){if(l.type==='symbol'&&l.layout&&l.layout['text-field'])return l.id}}function addBefore(layer,before){if(before)map.addLayer(layer,before);else map.addLayer(layer)}function addBuildings(){const before=labelLayer();if(!map.getSource('ofm-buildings'))map.addSource('ofm-buildings',{type:'vector',url:'https://tiles.openfreemap.org/planet'});const H=['case',['has','render_height'],['to-number',['get','render_height'],12],['has','height'],['to-number',['get','height'],12],['has','building:levels'],['*',['to-number',['get','building:levels'],4],3.2],12];addBefore({id:'holo-3d-buildings',source:'ofm-buildings','source-layer':'building',type:'fill-extrusion',minzoom:13,filter:['!=',['get','hide_3d'],true],paint:{'fill-extrusion-color':['interpolate',['linear'],H,0,'#07304c',35,'#00d5ff',120,'#bdfcff'],'fill-extrusion-height':['interpolate',['linear'],['zoom'],13,0,14.4,H],'fill-extrusion-base':['case',['has','render_min_height'],['to-number',['get','render_min_height'],0],0],'fill-extrusion-opacity':.84,'fill-extrusion-vertical-gradient':true}},before);addBefore({id:'holo-building-outlines',source:'ofm-buildings','source-layer':'building',type:'line',minzoom:14,paint:{'line-color':'#dffcff','line-opacity':['interpolate',['linear'],['zoom'],14,.14,17,.46],'line-width':['interpolate',['linear'],['zoom'],14,.25,17,1]}},before);map.on('click','holo-3d-buildings',e=>{const f=e.features&&e.features[0];if(!f)return;const p=f.properties||{};new maplibregl.Popup({closeButton:true,maxWidth:'260px'}).setLngLat(e.lngLat).setHTML('<b>'+esc(p.name||'Building footprint')+'</b><br>Height: '+esc(heightText(p))+'<br>Source: OpenStreetMap / OpenFreeMap').addTo(map)});map.on('mouseenter','holo-3d-buildings',()=>map.getCanvas().style.cursor='pointer');map.on('mouseleave','holo-3d-buildings',()=>map.getCanvas().style.cursor='')}const landmarks=[['Washington Monument',-77.03525,38.88948,1],['U.S. Capitol',-77.00905,38.88994,0],['White House',-77.03653,38.89768,0],['Lincoln Memorial',-77.05018,38.88927,0],['Jefferson Memorial',-77.03653,38.88139,0],['Union Station',-77.00643,38.8971,0],['National Cathedral',-77.07025,38.93059,0],['Pentagon',-77.05627,38.87186,0]];function addMarkers(){for(const m of landmarks){const el=document.createElement('button');el.className='marker'+(m[3]?' monument':'');el.title=m[0];new maplibregl.Marker({element:el,anchor:'center'}).setLngLat([m[1],m[2]]).setPopup(new maplibregl.Popup({offset:18}).setHTML('<b>'+m[0]+'</b>')).addTo(map)}}function fly(center,zoom,pitch,bearing,msg){map.easeTo({center,zoom,pitch,bearing,duration:900,essential:true});status.textContent=msg}map.on('load',()=>{holoStyle();addBuildings();addMarkers();map.touchZoomRotate.enableRotation();map.dragRotate.enable();map.keyboard.enable();setTimeout(()=>{$('loading').classList.add('hide');setTimeout(()=>$('loading').remove(),500)},600)});map.on('moveend',()=>{const z=map.getZoom().toFixed(1),p=Math.round(map.getPitch());status.textContent='Live map. Zoom '+z+', pitch '+p+'°. Buildings are real vector footprints and get most useful at zoom 14+.'});$('full').onclick=()=>fly([-77.0365,38.8977],11.55,47,-16,'Full D.C. view. Pan freely; zoom in for actual building extrusions.');$('downtown').onclick=()=>fly([-77.032,38.899],15.65,67,-22,'3D downtown view. Real streets, real vector building footprints.');$('mall').onclick=()=>fly([-77.036,38.8897],15.15,64,-8,'National Mall. Move around normally; this is not locked.');$('capitol').onclick=()=>fly([-77.00905,38.88994],16.05,66,28,'Capitol focus. Real map engine, actual pan/zoom/tilt.');$('white').onclick=()=>fly([-77.03653,38.89768],16.2,66,-20,'White House focus.');$('hud').onclick=()=>{document.querySelector('.panel').style.display='none';document.querySelector('.top').style.display='none'};</script></body></html>
